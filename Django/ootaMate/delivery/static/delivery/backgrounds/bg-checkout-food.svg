<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ddd6fe"/>
      <stop offset="1" stop-color="#fbcfe8"/>
    </linearGradient>
    <pattern id="icons" width="320" height="230" patternUnits="userSpaceOnUse">
      <!-- receipt -->
      <rect x="34" y="34" width="96" height="140" rx="10" fill="#ffffff" opacity="0.58"/>
      <path d="M52 64 H112 M52 86 H108 M52 108 H116 M52 130 H104" stroke="#111827" stroke-width="6" opacity="0.45" stroke-linecap="round"/>
      <!-- fork -->
      <rect x="186" y="46" width="6" height="96" rx="3" fill="#111827" opacity="0.45"/>
      <rect x="176" y="46" width="4" height="28" rx="2" fill="#111827" opacity="0.45"/>
      <rect x="182" y="46" width="4" height="28" rx="2" fill="#111827" opacity="0.45"/>
      <rect x="188" y="46" width="4" height="28" rx="2" fill="#111827" opacity="0.45"/>
      <rect x="194" y="46" width="4" height="28" rx="2" fill="#111827" opacity="0.45"/>
      <!-- spoon -->
      <ellipse cx="224" cy="58" rx="11" ry="17" fill="#111827" opacity="0.45"/>
      <rect x="220" y="72" width="8" height="70" rx="4" fill="#111827" opacity="0.45"/>
      <text x="160" y="188" font-size="24" font-family="Arial" fill="#111827" opacity="0.45">ORDER</text>
    </pattern>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <rect width="1400" height="900" fill="url(#icons)"/>
</svg>
