<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bae6fd"/>
      <stop offset="1" stop-color="#86efac"/>
    </linearGradient>
    <pattern id="icons" width="280" height="220" patternUnits="userSpaceOnUse">
      <!-- burger -->
      <path d="M52 82 C52 52 128 52 128 82 Z" fill="#f59e0b" opacity="0.6"/>
      <rect x="52" y="86" width="76" height="10" rx="5" fill="#16a34a" opacity="0.6"/>
      <rect x="48" y="98" width="84" height="13" rx="6" fill="#b45309" opacity="0.55"/>
      <rect x="52" y="114" width="76" height="14" rx="7" fill="#fbbf24" opacity="0.6"/>
      <!-- pizza slice -->
      <path d="M182 48 L244 110 L182 126 Z" fill="#fde68a" opacity="0.65"/>
      <circle cx="198" cy="90" r="6" fill="#ef4444" opacity="0.65"/>
      <circle cx="214" cy="104" r="6" fill="#ef4444" opacity="0.65"/>
      <circle cx="198" cy="112" r="5" fill="#16a34a" opacity="0.65"/>
      <!-- label -->
      <text x="62" y="184" font-size="24" font-family="Arial" fill="#064e3b" opacity="0.5">TASTY FOOD</text>
    </pattern>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <rect width="1400" height="900" fill="url(#icons)"/>
</svg>
