<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bbf7d0"/>
      <stop offset="1" stop-color="#bae6fd"/>
    </linearGradient>
    <pattern id="waves" width="120" height="60" patternUnits="userSpaceOnUse">
      <path d="M0 30 C20 10 40 10 60 30 C80 50 100 50 120 30" fill="none" stroke="#0b6b4b" stroke-opacity="0.12" stroke-width="3"/>
    </pattern>
    <!-- food order motif -->
    <pattern id="food" width="200" height="160" patternUnits="userSpaceOnUse">
      <!-- cloche/serving dome -->
      <path d="M62 74 C62 52 78 36 100 36 C122 36 138 52 138 74" fill="none" stroke="#0b6b4b" stroke-opacity="0.14" stroke-width="5" stroke-linecap="round"/>
      <path d="M56 76 H144" stroke="#0b6b4b" stroke-opacity="0.14" stroke-width="5" stroke-linecap="round"/>
      <path d="M64 92 C70 112 86 124 100 124 C114 124 130 112 136 92" fill="#ffffff" opacity="0.18"/>
      <!-- plate -->
      <ellipse cx="100" cy="128" rx="44" ry="10" fill="#ffffff" opacity="0.22"/>
      <!-- spice dots -->
      <circle cx="26" cy="36" r="4" fill="#08573c" opacity="0.14"/>
      <circle cx="40" cy="26" r="3" fill="#0b6b4b" opacity="0.12"/>
      <circle cx="46" cy="42" r="3" fill="#0b6b4b" opacity="0.10"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#g)"/>
  <rect width="1200" height="800" fill="url(#waves)"/>
  <rect width="1200" height="800" fill="url(#food)"/>
  <circle cx="1040" cy="160" r="220" fill="#ffffff" opacity="0.28"/>
  <circle cx="260" cy="640" r="260" fill="#ffffff" opacity="0.22"/>
</svg>
