<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Restaurant'</title>
    <link rel="stylesheet" href="{% static 'delivery/site-theme.css' %}">
</head>
<body class="page-add-restaurant">
    <form action="{% url 'add_restaurant' %}" method="POST">
       <label>Restaurant name</label>
       <input type="text" name="name">
       <br><br>
       <label>Picture url</label>
       <input type="text" name="picture">
       <br><br>
       <label>Cuisine</label>
       <input type="text" name="cuisine">
       <br><br>
       <label>Rating</label>
       <input type="text" name="rating" min="0" max="5" step="0.5">
       <br><br>
       <br><br>
       <button type="submit">Add Restaurent</button>
    </form>
</body>
</html>
